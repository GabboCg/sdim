url: https://gabbocg.github.io/sdim/

template:
  bootstrap: 5
  bslib:
    primary: "#1a9e78"
    navbar-bg: "#1e2d3d"
    navbar-light-color: "#ffffffcc"
    navbar-light-hover-color: "#ffffff"
    navbar-light-brand-color: "#ffffff"

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: "Replicating He et al. (2023)"
          href: articles/he2023-table3.html
        - text: "Replicating Huang et al. (2022)"
          href: articles/huang2022-table4.html

articles:
  - title: Replications
    contents:
      - he2023-table3
      - huang2022-table4

reference:
  - title: Factor Extraction
    desc: Core estimation functions for supervised dimension reduction.
    contents:
      - pca_est
      - pls_est
      - spca_est
      - rra_est
      - ipca_est

  - title: Prediction
    desc: Project new data onto estimated factor loadings.
    contents:
      - predict.sdim_fit
      - predict.sdim_spca

  - title: Evaluation
    desc: Evaluate extracted factors.
    contents:
      - eval_factors

  - title: OOS Forecasting Helpers
    desc: Utilities for out-of-sample macroeconomic forecasting exercises.
    contents:
      - oos_standardize
      - select_ar_lag_sic
      - estimate_ar_res
      - estimate_ardl_multi

  - title: Datasets
    desc: Bundled datasets for replication and examples.
    contents:
      - starts_with("he2023")
      - starts_with("huang2022")
