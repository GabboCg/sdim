url: https://gabbocg.github.io/sdim/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]

articles:
  - title: Replications
    navbar: Replications
    contents:
      - he2023-table3
      - huang2022-table4

reference:
  - title: Factor Extraction
    desc: Core estimation functions for supervised dimension reduction.
    contents:
      - pca_est
      - pls_est
      - spca_est
      - rra_est
      - ipca_est

  - title: Prediction
    desc: Project new data onto estimated factor loadings.
    contents:
      - predict.sdim_fit
      - predict.sdim_spca

  - title: Evaluation
    desc: Evaluate extracted factors.
    contents:
      - eval_factors

  - title: Datasets
    desc: Bundled datasets for replication and examples.
    contents:
      - starts_with("he2023")
      - starts_with("huang2022")
